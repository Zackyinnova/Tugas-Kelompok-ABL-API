<!DOCTYPE html>

<html class="light" lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>Login | Scholarly Modernism</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&amp;family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&amp;display=swap" rel="stylesheet"/>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        <link rel="stylesheet" href="../../static/css/style.css">

        <script id="tailwind-config">
                tailwind.config = {
                    darkMode: "class",
                    theme: {
                        extend: {
                            "colors": {
                                "error-container": "#ffdad6",
                                "on-primary-container": "#7c839b",
                                "surface-container-highest": "#e0e3e5",
                                "tertiary-fixed": "#dde3eb",
                                "error": "#ba1a1a",
                                "background": "#f7f9fb",
                                "primary-fixed": "#dae2fd",
                                "secondary-container": "#d5e3fd",
                                "primary-fixed-dim": "#bec6e0",
                                "on-primary-fixed": "#131b2e",
                                "on-secondary-container": "#57657b",
                                "on-primary": "#ffffff",
                                "on-primary-fixed-variant": "#3f465c",
                                "tertiary": "#000000",
                                "surface-container-lowest": "#ffffff",
                                "outline": "#76777d",
                                "surface-container": "#eceef0",
                                "on-error-container": "#93000a",
                                "primary-container": "#131b2e",
                                "on-tertiary-fixed": "#161c22",
                                "inverse-primary": "#bec6e0",
                                "surface": "#f7f9fb",
                                "inverse-surface": "#2d3133",
                                "on-secondary-fixed": "#0d1c2f",
                                "on-secondary-fixed-variant": "#3a485c",
                                "on-tertiary-container": "#7e848c",
                                "secondary-fixed-dim": "#b9c7e0",
                                "on-tertiary-fixed-variant": "#41474e",
                                "outline-variant": "#c6c6cd",
                                "primary": "#000000",
                                "inverse-on-surface": "#eff1f3",
                                "tertiary-container": "#161c22",
                                "secondary": "#515f74",
                                "surface-container-low": "#f2f4f6",
                                "surface-bright": "#f7f9fb",
                                "secondary-fixed": "#d5e3fd",
                                "on-secondary": "#ffffff",
                                "on-background": "#191c1e",
                                "surface-dim": "#d8dadc",
                                "on-tertiary": "#ffffff",
                                "on-surface": "#191c1e",
                                "tertiary-fixed-dim": "#c1c7cf",
                                "surface-variant": "#e0e3e5",
                                "on-error": "#ffffff",
                                "surface-tint": "#565e74",
                                "surface-container-high": "#e6e8ea",
                                "on-surface-variant": "#45464d"
                            },
                            "borderRadius": {
                                "DEFAULT": "0.125rem",
                                "lg": "0.25rem",
                                "xl": "0.5rem",
                                "full": "0.75rem"
                            },
                            "spacing": {
                                "base": "8px",
                                "container-max": "1280px",
                                "stack-lg": "48px",
                                "margin-desktop": "48px",
                                "margin-mobile": "20px",
                                "gutter": "24px",
                                "stack-sm": "12px",
                                "stack-md": "24px"
                            },
                            "fontFamily": {
                                "headline-md": ["\"Source Serif 4\""],
                                "label-sm": ["Hanken Grotesk"],
                                "label-md": ["Hanken Grotesk"],
                                "display-lg": ["\"Source Serif 4\""],
                                "title-lg": ["Hanken Grotesk"],
                                "body-md": ["Hanken Grotesk"],
                                "body-lg": ["Hanken Grotesk"],
                                "headline-sm": ["\"Source Serif 4\""],
                                "display-lg-mobile": ["\"Source Serif 4\""]
                            },
                            "fontSize": {
                                "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                                "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                                "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                                "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                                "body-lg": ["18px", {"lineHeight": "30px", "fontWeight": "400"}],
                                "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                                "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
                            }
                        },
                    },
                }
        </script>
    </head>

    <body class="bg-surface text-on-surface min-h-screen flex flex-col">
        <!-- Top Navigation (Shell Rule: Suppressed Links for Focused Transactional Flow) -->
        <header class="w-full top-0 sticky bg-surface border-b border-outline-variant z-50">
            <div class="flex justify-between items-center max-w-container-max mx-auto px-margin-desktop h-20">
                <div class="font-headline-sm text-headline-sm text-primary tracking-tight">Scholarly Modernism</div>

                <div class="hidden md:flex items-center gap-8">
                    <a class="text-on-surface-variant font-label-md hover:text-primary transition-colors" href="#">Catalog</a>
                    <a class="px-6 py-2 border border-outline text-primary font-label-md hover:bg-surface-container transition-all" href="#">Support</a>
                </div>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center px-margin-mobile py-stack-lg">
            <!-- Auth Container -->
            <div class="w-full max-w-[440px] flex flex-col gap-stack-md">

                <!-- Branding/Greeting -->
                <div class="text-center space-y-2 mb-4">
                    <h1 class="font-headline-md text-headline-md text-primary">Welcome Back</h1>
                    <p class="font-body-md text-on-surface-variant">Enter your credentials to access the archives.</p>
                </div>

                <!-- Login Card -->
                <div class="bg-white p-8 border border-outline-variant rounded-DEFAULT form-shadow transition-all duration-300">

                    <form action="login_page" class="space-y-6" method="POST">
                        <!-- Email Field -->
                        <div class="flex flex-col gap-2">
                        <label class="font-label-sm text-label-sm uppercase text-on-surface-variant tracking-wider" for="email">
                                                    Institutional Email
                                                </label>
                        <input class="w-full h-12 px-4 border border-outline-variant bg-surface-container-lowest focus:ring-0 focus:border-primary transition-all font-body-md" id="email" name="email" placeholder="e.g. researcher@scholarly.edu" required="" type="email"/>
                        </div>

                        <!-- Password Field -->
                        <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                        <label class="font-label-sm text-label-sm uppercase text-on-surface-variant tracking-wider" for="password">
                                                        Secret Key
                                                    </label>
                        <a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
                        </div>
                        <div class="relative">
                        <input class="w-full h-12 px-4 border border-outline-variant bg-surface-container-lowest focus:ring-0 focus:border-primary transition-all font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" type="button">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                        </div>
                        </div>

                        <!-- Remember Me -->
                        <div class="flex items-center gap-3">
                            <input class="w-4 h-4 rounded-none border-outline text-primary focus:ring-offset-0 focus:ring-0" id="remember" type="checkbox"/>
                            <label class="font-body-md text-body-md text-on-surface-variant select-none" for="remember">
                                Keep me logged in for this session
                            </label>
                        </div>

                        <!-- CTA Button -->
                        <button class="w-full h-14 bg-primary text-on-primary font-label-md uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                                                Access Library
                        </button>
                    </form>

                    <!-- Divider -->
                    <div class="relative my-8">
                        <div class="absolute inset-0 flex items-center">
                            <span class="w-full border-t border-outline-variant"></span>
                        </div>

                        <div class="relative flex justify-center text-label-sm uppercase">
                            <span class="bg-white px-4 text-on-surface-variant">Federated Access</span>
                        </div>
                    </div>

                    <!-- Secondary Auth -->
                    <button type="submit" class="w-full h-12 border border-outline-variant flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors font-label-md text-primary">
                        <span class="material-symbols-outlined">account_balance</span>
                                            Sign in with ORCID
                    </button>
                </div>
            
                <!-- Footer Link -->
                <div class="text-center">
                    <p class="font-body-md text-body-md text-on-surface-variant">
                                        New scholar? <a class="text-primary font-bold hover:underline decoration-1 underline-offset-4" href="{{ url_for('register_page') }}">Join the collection</a>
                    </p>
                </div>
            </div>
        </main>

        <!-- Footer (Shell Rule: Simplified for Transactional Context) -->
        <footer class="w-full bg-surface-container dark:bg-tertiary-container mt-auto border-t border-outline-variant">
            <div class="max-w-container-max mx-auto px-margin-desktop py-stack-md flex flex-col md:flex-row justify-between items-center gap-stack-sm">
                <div class="font-headline-sm text-headline-sm text-primary">Scholarly Modernism</div>
                <div class="flex flex-wrap justify-center gap-6 text-on-surface-variant font-label-sm">
                    <a class="hover:underline decoration-1 underline-offset-4" href="#">Archives</a>
                    <a class="hover:underline decoration-1 underline-offset-4" href="#">Terms of Service</a>
                    <a class="hover:underline decoration-1 underline-offset-4" href="#">Privacy Policy</a>
                    <a class="hover:underline decoration-1 underline-offset-4" href="#">Contact Us</a>
                </div>

                <div class="font-label-sm text-on-surface-variant">
                                © 2024 Scholarly Modernism. Curated for the intellectual mind.
                </div>
            </div>
        </footer>

        <script>
                // Micro-interaction for input fields
                const inputs = document.querySelectorAll('input[type="email"], input[type="password"]');
                inputs.forEach(input => {
                    input.addEventListener('focus', () => {
                        input.parentElement.querySelector('label').style.color = '#000000';
                    });
                    input.addEventListener('blur', () => {
                        input.parentElement.querySelector('label').style.color = '';
                    });
                });

                // Toggle password visibility
                const toggleBtn = document.querySelector('button .material-symbols-outlined');
                if (toggleBtn) {
                    toggleBtn.parentElement.addEventListener('click', () => {
                        const passInput = document.getElementById('password');
                        const isPass = passInput.type === 'password';
                        passInput.type = isPass ? 'text' : 'password';
                        toggleBtn.textContent = isPass ? 'visibility_off' : 'visibility';
                    });
                }
        </script>
    </body>
</html>
